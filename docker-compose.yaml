version: "3.9"

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             uvicorn core.asgi:application --host 0.0.0.0 --port 8000"

  worker:
    build: .
    command: celery -A core worker --loglevel=info
    depends_on:
      - web

  beat:
    build: .
    command: celery -A core beat --loglevel=info
    depends_on:
      - web
